<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Crew Scheduler v6.2 Debug</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f8fb;color:#0f172a;margin:0}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    .bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    button{border:none;border-radius:10px;padding:10px 14px;background:#2563eb;color:#fff;font-weight:600;cursor:pointer}
    button.secondary{background:#334155}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:16px;margin-bottom:16px}
    pre{white-space:pre-wrap;word-break:break-word;background:#0b1220;color:#dbeafe;padding:14px;border-radius:12px;max-height:360px;overflow:auto}
    .muted{color:#64748b}
    .ok{color:#047857;font-weight:700}
    .err{color:#b91c1c;font-weight:700}
  </style>
  <script src="https://alcdn.msauth.net/browser/2.39.0/js/msal-browser.min.js"></script>
</head>
<body>
<div class="wrap">
  <h1>Crew Scheduler v6.2 Debug Outlook</h1>
  <p class="muted">Cette version affiche les détails utiles directement dans la page.</p>

  <div class="bar">
    <button id="btnLogin">Se connecter à Microsoft</button>
    <button id="btnSync">Sync Outlook</button>
    <button id="btnLogout" class="secondary">Se déconnecter</button>
  </div>

  <div class="card">
    <h3>État</h3>
    <div id="status">Prêt.</div>
  </div>

  <div class="card">
    <h3>Compte actif</h3>
    <pre id="accountBox">Aucun compte actif.</pre>
  </div>

  <div class="card">
    <h3>Claims du token Graph</h3>
    <pre id="claimsBox">Aucun token Graph récupéré.</pre>
  </div>

  <div class="card">
    <h3>Réponse Graph</h3>
    <pre id="graphBox">Aucune réponse Graph.</pre>
  </div>
</div>

<script>
const clientId = "b71fb750-0c78-4903-9489-fd2d0fc18884";
const tenantId = "b5e72da6-a727-4c1d-b80d-e381c3123448";
const redirectUri = "https://gedlp.github.io/crew-scheduler/";

const msalConfig = {
  auth: {
    clientId,
    authority: `https://login.microsoftonline.com/${tenantId}`,
    redirectUri
  },
  cache: {
    cacheLocation: "localStorage",
    storeAuthStateInCookie: false
  }
};

const loginRequest = {
  scopes: ["User.Read", "Calendars.Read"]
};

const pca = new msal.PublicClientApplication(msalConfig);

function setStatus(msg, cls=""){
  const el=document.getElementById("status");
  el.className=cls;
  el.textContent=msg;
}
function show(obj, id){
  document.getElementById(id).textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
}
function parseJwt(token){
  try{
    const payload = token.split('.')[1];
    const base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
    const json = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json);
  }catch(e){
    return {parse_error:String(e)};
  }
}
function getActiveAccount(){
  return pca.getActiveAccount() || pca.getAllAccounts()[0] || null;
}
function refreshAccountBox(){
  const acct = getActiveAccount();
  if(!acct){ show("Aucun compte actif.", "accountBox"); return; }
  pca.setActiveAccount(acct);
  show({
    username: acct.username,
    tenantId: acct.tenantId,
    homeAccountId: acct.homeAccountId,
    environment: acct.environment,
    localAccountId: acct.localAccountId,
    name: acct.name
  }, "accountBox");
}
async function signIn(){
  try{
    setStatus("Connexion Microsoft en cours...");
    const res = await pca.loginPopup(loginRequest);
    pca.setActiveAccount(res.account);
    refreshAccountBox();
    setStatus("Connecté à Microsoft.", "ok");
  }catch(e){
    setStatus("Échec de connexion Microsoft.", "err");
    show(String(e && e.message ? e.message : e), "graphBox");
  }
}
async function getGraphToken(){
  let account = getActiveAccount();
  if(!account){
    throw new Error("Aucun compte actif. Clique d'abord sur Se connecter à Microsoft.");
  }
  pca.setActiveAccount(account);
  refreshAccountBox();

  try{
    const tokenRes = await pca.acquireTokenSilent({...loginRequest, account});
    return tokenRes.accessToken;
  }catch(silentErr){
    setStatus("Token silencieux indisponible, popup demandée...");
    const tokenRes = await pca.acquireTokenPopup({...loginRequest, account, prompt: "select_account"});
    return tokenRes.accessToken;
  }
}
async function syncOutlook(){
  try{
    setStatus("Récupération du token Graph...");
    const token = await getGraphToken();
    const claims = parseJwt(token);
    show(claims, "claimsBox");

    const start = new Date(Date.UTC(2026,3,1,4,0,0)).toISOString();
    const end = new Date(Date.UTC(2026,5,1,3,59,59)).toISOString();
    const url = "https://graph.microsoft.com/v1.0/me/calendarView"
      + `?startDateTime=${encodeURIComponent(start)}`
      + `&endDateTime=${encodeURIComponent(end)}`
      + `&$top=25`
      + `&$select=id,subject,start,end,location,bodyPreview,webLink`
      + `&$orderby=start/dateTime`;

    setStatus("Appel Graph en cours...");
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${token}` }
    });

    const text = await res.text();
    let body = text;
    try { body = JSON.parse(text); } catch(e) {}

    show({
      status: res.status,
      ok: res.ok,
      body
    }, "graphBox");

    if(res.ok){
      setStatus("Graph OK.", "ok");
    }else{
      setStatus(`Graph ${res.status}.`, "err");
    }
  }catch(e){
    setStatus("Erreur durant la sync Outlook.", "err");
    show(String(e && e.message ? e.message : e), "graphBox");
  }
}
async function signOut(){
  const acct = getActiveAccount();
  try{
    await pca.logoutPopup({ account: acct, postLogoutRedirectUri: redirectUri });
  }catch(e){}
  show("Aucun compte actif.", "accountBox");
  show("Aucun token Graph récupéré.", "claimsBox");
  show("Aucune réponse Graph.", "graphBox");
  setStatus("Déconnecté.");
}

(async function init(){
  try{
    await pca.initialize();
    await pca.handleRedirectPromise();
  }catch(e){}
  refreshAccountBox();
})();

document.getElementById("btnLogin").addEventListener("click", signIn);
document.getElementById("btnSync").addEventListener("click", syncOutlook);
document.getElementById("btnLogout").addEventListener("click", signOut);
</script>
</body>
</html>
