<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Crew Scheduler v6 — Outlook live + notifications</title>
  <style>
    :root{
      --bg:#f5f7fb; --panel:#fff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --blue:#3b82f6; --blueSoft:#dbeafe; --green:#10b981; --greenSoft:#d1fae5;
      --red:#ef4444; --redSoft:#fee2e2; --amber:#f59e0b; --amberSoft:#fef3c7;
      --violet:#7c3aed; --violetSoft:#ede9fe; --shadow:0 18px 55px rgba(15,23,42,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text); background:linear-gradient(180deg,#f8fbff 0%, var(--bg) 100%);
    }
    button,input,select,textarea{font:inherit}
    .app{min-height:100vh;display:grid;grid-template-columns:250px 1fr}
    .sidebar{position:sticky;top:0;height:100vh;padding:18px;border-right:1px solid rgba(226,232,240,.9);background:rgba(255,255,255,.84);backdrop-filter:blur(12px)}
    .brand,.frame,.hero,.stat,.outlookBox,.detailCard,.noticeCard,.agendaItem,.calendarCell,.miniCard{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
    .brand{border-radius:26px;padding:18px;margin-bottom:16px;background:linear-gradient(180deg,#fff 0%, #f8fafc 100%)}
    .logo{width:46px;height:46px;border-radius:15px;background:#111827;color:#fff;display:grid;place-items:center;font-weight:800;letter-spacing:.04em;margin-bottom:12px}
    .brand h1{margin:0 0 6px;font-size:16px;line-height:1.1}
    .brand p{margin:0;color:var(--muted);font-size:12px}
    .nav{display:grid;gap:8px}
    .nav button{padding:12px 14px;border:none;border-radius:16px;background:transparent;text-align:left;font-weight:700;color:var(--text);cursor:pointer}
    .nav button.active{background:#eff6ff;color:#1d4ed8}
    .nav button:hover{background:#f8fafc}

    .main{padding:26px}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:16px}
    .topbar h2{margin:0;font-size:34px;letter-spacing:-.04em}
    .topbar p{margin:6px 0 0;color:var(--muted);max-width:880px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:none;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
    .btn.primary{background:var(--blue);color:#fff}
    .btn.secondary{background:#fff;border:1px solid var(--line);color:var(--text)}
    .btn.ghost{background:#eef2ff;color:#3730a3}
    .btn.small{padding:8px 12px;border-radius:12px;font-size:13px}
    .btn.danger{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
    .hero{border-radius:26px;padding:18px;margin-bottom:16px;background:linear-gradient(180deg,#fff 0%, #fbfdff 100%)}
    .heroGrid{display:grid;grid-template-columns:1.25fr .75fr;gap:16px}
    .pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .pill,.tag{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800}
    .pill.complete{background:var(--greenSoft);color:#047857}.pill.pending{background:var(--amberSoft);color:#b45309}.pill.incomplete{background:var(--redSoft);color:#b91c1c}
    .pill.confirmed{background:var(--greenSoft);color:#047857}.pill.sent{background:var(--blueSoft);color:#1d4ed8}.pill.declined{background:var(--redSoft);color:#b91c1c}.pill.waiting{background:var(--amberSoft);color:#b45309}
    .tag.outlook{background:var(--violetSoft);color:#5b21b6}.tag.email{background:#e0f2fe;color:#075985}.tag.sms{background:#ede9fe;color:#6d28d9}.tag.both{background:#ecfccb;color:#3f6212}.tag.none{background:#f1f5f9;color:#475569}
    .heroHint{border:1px dashed #cbd5e1;border-radius:16px;padding:12px;background:#f8fafc;color:#475569}
    .heroFields{display:grid;gap:10px}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:16px}
    .stat{border-radius:22px;padding:16px;background:linear-gradient(180deg,#fff 0%, #fbfdff 100%)}
    .stat .label{font-size:12px;color:var(--muted);margin-bottom:10px}.stat .value{font-size:28px;font-weight:900;letter-spacing:-.04em}
    .frame{border-radius:26px;padding:18px}
    .layout{display:grid;grid-template-columns:1.18fr .82fr;gap:16px}
    .stack{display:grid;gap:16px}
    .sectionHead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
    .sectionHead h3{margin:0;font-size:18px}.sectionHead p{margin:3px 0 0;color:var(--muted);font-size:12px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .input,.select,textarea.input{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 13px;min-height:44px;color:var(--text)}
    textarea.input{min-height:92px;resize:vertical}

    .calendarHead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .calendarNav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .calendarTitle{font-size:20px;font-weight:900;letter-spacing:-.03em}
    .week{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:8px}
    .dow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 4px 4px;font-weight:800}
    .calendarGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
    .calendarCell{min-height:132px;border-radius:20px;padding:10px;display:flex;flex-direction:column;gap:8px;cursor:pointer;background:linear-gradient(180deg,#fff 0%, #fbfdff 100%)}
    .calendarCell.other{opacity:.45}.calendarCell.today{box-shadow:inset 0 0 0 2px #bfdbfe}.calendarCell.active{box-shadow:inset 0 0 0 2px #3b82f6;background:#f8fbff}
    .calendarDate{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:800}
    .calendarEvents{display:grid;gap:6px}
    .calendarEvent{border:none;text-align:left;border-radius:12px;padding:8px 9px;background:#eef2ff;color:#312e81;cursor:pointer;font-size:12px;font-weight:800}
    .calendarBadge{font-size:11px;padding:4px 7px;border-radius:999px;background:#eff6ff;color:#1d4ed8}

    .agendaList,.noticeList,.personList,.assignmentList,.queueList{display:grid;gap:10px}
    .agendaItem,.noticeCard,.miniCard{border-radius:18px;padding:12px;background:#fff}
    .agendaItem.active{box-shadow:inset 0 0 0 2px #93c5fd;background:#f8fbff}
    .agendaTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .eventName,.personName{font-weight:900}
    .muted{color:var(--muted)} .tiny{font-size:12px;color:var(--muted)}
    .detailCard{border-radius:24px;padding:16px;background:linear-gradient(180deg,#fff 0%, #fbfdff 100%)}
    .detailTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.detailTop h3{margin:0;font-size:24px;line-height:1.06}
    .roleMatrix{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
    .miniCard{padding:14px}
    .miniCard strong{display:block;font-size:20px;margin-top:6px}
    .assignmentRow{display:grid;grid-template-columns:1.2fr auto auto auto;gap:10px;align-items:center;border:1px solid #edf2f7;border-radius:16px;padding:12px;background:#fff}
    .assignmentMeta,.personMeta{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
    .assignmentActions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .linkBox{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:14px;background:#f8fafc}
    .linkValue{flex:1;min-width:220px;font-size:12px;color:#334155;word-break:break-all}
    .noticeCard{border:1px solid #fecaca;background:#fff5f5}.noticeCard.good{border-color:#bbf7d0;background:#f0fdf4}.noticeActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .queueRow{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff}

    table{width:100%;border-collapse:collapse}.tableWrap{border:1px solid var(--line);border-radius:20px;overflow:hidden;background:#fff}
    thead th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:#f8fafc;padding:14px 16px;border-bottom:1px solid var(--line)}
    tbody td{padding:13px 16px;border-bottom:1px solid #eef2f7;vertical-align:top} tbody tr:last-child td{border-bottom:none}

    dialog{border:none;padding:0;border-radius:24px;max-width:680px;width:min(94vw,680px);box-shadow:0 30px 120px rgba(15,23,42,.28)}
    dialog::backdrop{background:rgba(15,23,42,.35);backdrop-filter:blur(4px)}
    .modal{padding:20px}.modal h3{margin:0 0 14px;font-size:24px}.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.formGrid .full{grid-column:1 / -1} label{display:grid;gap:7px;font-weight:700;font-size:13px}.modalActions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}

    .confirmPage{min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at top, #eff6ff 0%, #f8fafc 35%, #eef2f7 100%)}
    .confirmCard{width:min(760px,96vw);background:#fff;border:1px solid var(--line);border-radius:28px;padding:26px;box-shadow:var(--shadow)}
    .confirmCard h1{margin:12px 0 10px;font-size:34px;letter-spacing:-.04em}.confirmCard p{color:var(--muted)}.confirmActions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}.confirmInfo{display:grid;gap:10px;margin-top:18px}.confirmInfo .row{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fbfdff}
    .empty{border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;color:var(--muted);background:#fbfdff}

    @media (max-width:1280px){.stats{grid-template-columns:repeat(3,1fr)} .layout{grid-template-columns:1fr} .heroGrid{grid-template-columns:1fr}}
    @media (max-width:860px){.app{grid-template-columns:1fr}.sidebar{display:none}.main{padding:16px}.stats{grid-template-columns:repeat(2,1fr)}.week,.calendarGrid{grid-template-columns:repeat(2,1fr)}.dow{display:none}.formGrid{grid-template-columns:1fr}.assignmentRow{grid-template-columns:1fr}}
    @media (max-width:620px){.stats{grid-template-columns:1fr}.topbar{flex-direction:column}.week,.calendarGrid{grid-template-columns:1fr}}
  </style>
  <script defer src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <input type="file" id="icsInput" accept=".ics,text/calendar" hidden />

  <dialog id="eventDialog">
    <form class="modal" method="dialog" id="eventForm">
      <h3>Nouvel événement</h3>
      <div class="formGrid">
        <label class="full">Nom de l'événement
          <input class="input" name="name" required placeholder="Ex. Gala Fondation Lumière" />
        </label>
        <label>Date
          <input class="input" type="date" name="date" required />
        </label>
        <label>Heure
          <input class="input" type="time" name="time" required value="08:00" />
        </label>
        <label>Lieu
          <input class="input" name="location" placeholder="Ex. Centre Bell" />
        </label>
        <label>Rôles requis (format: Son:2, Éclairage:1)
          <input class="input" name="required" placeholder="Son:2, Éclairage:1, Vidéo:1" />
        </label>
        <label class="full">Notes
          <textarea class="input" name="notes" placeholder="Montage 8h, show 19h, démontage après..."></textarea>
        </label>
      </div>
      <div class="modalActions">
        <button class="btn secondary" value="cancel">Annuler</button>
        <button class="btn primary" value="default">Créer</button>
      </div>
    </form>
  </dialog>

  <dialog id="personDialog">
    <form class="modal" method="dialog" id="personForm">
      <h3>Ajouter une ressource</h3>
      <div class="formGrid">
        <label>Nom complet
          <input class="input" name="name" required placeholder="Ex. Marc Tremblay" />
        </label>
        <label>Type
          <select class="select" name="type">
            <option value="freelance">Pigiste</option>
            <option value="internal">Employé</option>
          </select>
        </label>
        <label>Rôle principal
          <select class="select" name="role">
            <option>Son</option><option>Éclairage</option><option>Vidéo</option><option>Stage</option><option>Camion</option><option>Général</option>
          </select>
        </label>
        <label>Préférence de contact
          <select class="select" name="contactPreference">
            <option value="email">Email</option>
            <option value="sms">SMS</option>
            <option value="both">Les 2</option>
            <option value="none">Aucune</option>
          </select>
        </label>
        <label>Email
          <input class="input" name="email" type="email" placeholder="email@exemple.com" />
        </label>
        <label>Téléphone
          <input class="input" name="phone" placeholder="514-555-1234" />
        </label>
      </div>
      <div class="modalActions">
        <button class="btn secondary" value="cancel">Annuler</button>
        <button class="btn primary" value="default">Ajouter</button>
      </div>
    </form>
  </dialog>

  <dialog id="assignDialog">
    <form class="modal" method="dialog" id="assignForm">
      <h3>Assigner une ressource</h3>
      <div class="formGrid">
        <label>Événement
          <select class="select" name="eventId"></select>
        </label>
        <label>Rôle
          <select class="select" name="role"></select>
        </label>
        <label class="full">Ressource
          <select class="select" name="personId"></select>
        </label>
      </div>
      <div class="modalActions">
        <button class="btn secondary" value="cancel">Annuler</button>
        <button class="btn primary" value="default">Assigner</button>
      </div>
    </form>
  </dialog>

  <script>
    const STORAGE_KEY = 'crew_scheduler_v4_notifications';
    const app = document.getElementById('app');
    const eventDialog = document.getElementById('eventDialog');
    const personDialog = document.getElementById('personDialog');
    const assignDialog = document.getElementById('assignDialog');
    const icsInput = document.getElementById('icsInput');
    const uid = () => Math.random().toString(36).slice(2, 10);
    const OUTLOOK_SCOPES = ['User.Read','Calendars.Read'];
    let msalInstance = null;
    let authState = { initialized:false, isAuthenticated:false, account:null, lastError:'' };

    function todayPlus(days){ const d = new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
    function firstOfMonthIso(offset = 0){ const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+offset); return d.toISOString().slice(0,10); }
    function escapeHtml(v){ return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }


    function msalConfigFromState(){
      return {
        auth:{
          clientId: state?.settings?.outlookClientId || 'b71fb750-0c78-4903-9489-fd2d0fc18884',
          authority: `https://login.microsoftonline.com/${state?.settings?.tenantId || 'b5e72da6-a727-4c1d-b80d-e381c3123448'}`,
          redirectUri: state?.settings?.redirectUri || 'https://gedlp.github.io/crew-scheduler/'
        },
        cache:{ cacheLocation:'localStorage', storeAuthStateInCookie:false }
      };
    }

    async function initAuth(){
      if(authState.initialized) return;
      if(!window.msal){ authState.lastError = 'Bibliothèque Microsoft non chargée.'; authState.initialized = true; return; }
      try{
        msalInstance = new msal.PublicClientApplication(msalConfigFromState());
        if(msalInstance.initialize) await msalInstance.initialize();
        if(msalInstance.handleRedirectPromise) {
          const redirectResponse = await msalInstance.handleRedirectPromise();
          if(redirectResponse?.account) msalInstance.setActiveAccount(redirectResponse.account);
        }
        const active = msalInstance.getActiveAccount() || msalInstance.getAllAccounts()[0] || null;
        if(active) msalInstance.setActiveAccount(active);
        authState = { initialized:true, isAuthenticated:!!active, account:active, lastError:'' };
      }catch(err){
        console.error(err);
        authState = { initialized:true, isAuthenticated:false, account:null, lastError: err?.message || String(err) };
      }
    }

    async function signInMicrosoft(){
      try{
        await initAuth();
        msalInstance = new msal.PublicClientApplication(msalConfigFromState());
        if(msalInstance.initialize) await msalInstance.initialize();
        const result = await msalInstance.loginPopup({ scopes: OUTLOOK_SCOPES, prompt:'select_account' });
        const account = result?.account || msalInstance.getAllAccounts()[0] || null;
        if(account) msalInstance.setActiveAccount(account);
        authState = { initialized:true, isAuthenticated:!!account, account, lastError:'' };
        render();
      }catch(err){
        console.error(err);
        authState.lastError = err?.message || String(err);
        alert('Connexion Microsoft échouée. Vérifie que le Redirect URI dans Entra correspond exactement à ton URL GitHub Pages.');
        render();
      }
    }

    async function signOutMicrosoft(){
      try{
        await initAuth();
        const account = msalInstance?.getActiveAccount() || msalInstance?.getAllAccounts?.()[0];
        if(msalInstance && account){
          await msalInstance.logoutPopup({ account });
        }
      }catch(err){
        console.error(err);
      }
      authState = { initialized:true, isAuthenticated:false, account:null, lastError:'' };
      render();
    }

    async function acquireGraphToken(){
      await initAuth();
      const account = msalInstance?.getActiveAccount() || msalInstance?.getAllAccounts?.()[0];
      if(!account) throw new Error('Aucun compte Microsoft connecté.');
      msalInstance.setActiveAccount(account);
      try{
        const silent = await msalInstance.acquireTokenSilent({ scopes: OUTLOOK_SCOPES, account });
        return silent.accessToken;
      }catch(err){
        const popup = await msalInstance.acquireTokenPopup({ scopes: OUTLOOK_SCOPES, account, prompt:'select_account' });
        return popup.accessToken;
      }
    }

    async function syncOutlookCalendar(){
      try{
        const token = await acquireGraphToken();
        const monthBase = new Date((state.calendarMonth || firstOfMonthIso(0)) + 'T00:00:00');
        const start = new Date(monthBase.getFullYear(), monthBase.getMonth(), 1, 0, 0, 0);
        const end = new Date(monthBase.getFullYear(), monthBase.getMonth()+2, 0, 23, 59, 59);
        const url = new URL('https://graph.microsoft.com/v1.0/me/calendarView');
        url.searchParams.set('startDateTime', start.toISOString());
        url.searchParams.set('endDateTime', end.toISOString());
        url.searchParams.set('$top', '200');
        url.searchParams.set('$select', 'id,subject,start,end,location,bodyPreview,webLink');
        url.searchParams.set('$orderby', 'start/dateTime');
        const res = await fetch(url.toString(), {
          headers:{
            'Authorization': `Bearer ${token}`,
            'Prefer': 'outlook.timezone="America/Montreal"'
          }
        });
        if(!res.ok){
          const text = await res.text();
          throw new Error(`Graph ${res.status}: ${text}`);
        }
        const data = await res.json();
        const mapped = (data.value || []).map(item => {
          const startRaw = item.start?.dateTime || item.start || '';
          const startDate = new Date(startRaw);
          const isoDate = !isNaN(startDate) ? startDate.toISOString().slice(0,10) : '';
          const time = !isNaN(startDate) ? startDate.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit',hour12:false}) : '';
          return {
            id: 'outlook_' + item.id,
            source:'outlook',
            outlookId:item.id,
            name:item.subject || 'Sans titre',
            date: isoDate,
            time,
            location:item.location?.displayName || '',
            notes:item.bodyPreview || '',
            webLink:item.webLink || '',
            requiredRoles:{}
          };
        }).filter(ev => ev.date);
        state.events = state.events.filter(e => e.source !== 'outlook').concat(mapped).sort((a,b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
        if(mapped.length && !getEvent(state.selectedEventId)?.id){
          state.selectedEventId = mapped[0].id;
        } else if(mapped.length && !state.selectedEventId){
          state.selectedEventId = mapped[0].id;
        }
        saveState();
        render();
        alert(`Synchronisation Outlook terminée : ${mapped.length} événement(s) importé(s).`);
      }catch(err){
        console.error(err);
        authState.lastError = err?.message || String(err);
        render();
        alert("Impossible de synchroniser Outlook. Vérifie les permissions User.Read et Calendars.Read, ainsi que le Redirect URI SPA.");
      }
    }

    function seedState(){
      const e1=uid(),e2=uid(), p1=uid(),p2=uid(),p3=uid(),p4=uid(),p5=uid();
      const a1=uid(),a2=uid(),a3=uid(),a4=uid();
      return {
        selectedEventId:e1,
        calendarMonth:firstOfMonthIso(0),
        settings:{
          appUrl:'https://gedlp.github.io/crew-scheduler/',
          outlookClientId:'b71fb750-0c78-4903-9489-fd2d0fc18884', tenantId:'b5e72da6-a727-4c1d-b80d-e381c3123448', redirectUri:'https://gedlp.github.io/crew-scheduler/',
          emailWebhook:'', smsWebhook:'', liveMode:false
        },
        events:[
          {id:e1, source:'manual', name:'Gala Fondation Lumière', date:todayPlus(2), time:'08:00', location:'Palais des congrès', notes:'Montage matin, prestation soir.', requiredRoles:{'Son':2,'Éclairage':1,'Vidéo':1}},
          {id:e2, source:'manual', name:'Festival de quartier', date:todayPlus(4), time:'10:00', location:'Parc Maisonneuve', notes:'Scène mobile, besoin d\'une équipe flexible.', requiredRoles:{'Son':1,'Éclairage':1,'Stage':2}}
        ],
        people:[
          {id:p1,name:'Alex Gagnon',type:'freelance',role:'Son',contactPreference:'both',email:'alex@demo.ca',phone:'514-555-1111'},
          {id:p2,name:'Marc Gendron',type:'freelance',role:'Son',contactPreference:'sms',email:'',phone:'514-555-2222'},
          {id:p3,name:'Julie Roy',type:'internal',role:'Éclairage',contactPreference:'email',email:'julie@demo.ca',phone:''},
          {id:p4,name:'Kevin Bouchard',type:'freelance',role:'Vidéo',contactPreference:'email',email:'kevin@demo.ca',phone:''},
          {id:p5,name:'Sébastien Fortin',type:'freelance',role:'Stage',contactPreference:'both',email:'seb@demo.ca',phone:'514-555-5555'}
        ],
        assignments:[
          {id:a1,eventId:e1,personId:p1,role:'Son',status:'sent',token:uid()+uid(),sentChannels:['email','sms'],lastSentAt:new Date().toISOString()},
          {id:a2,eventId:e1,personId:p2,role:'Son',status:'declined',token:uid()+uid(),sentChannels:['sms'],lastSentAt:new Date().toISOString()},

      };

    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw){ const seeded = seedState(); localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded)); return seeded; }
        const parsed = JSON.parse(raw);
        parsed.calendarMonth ||= firstOfMonthIso(0);
        parsed.settings ||= {appUrl:'https://gedlp.github.io/crew-scheduler/', outlookClientId:'b71fb750-0c78-4903-9489-fd2d0fc18884', tenantId:'b5e72da6-a727-4c1d-b80d-e381c3123448', redirectUri:'https://gedlp.github.io/crew-scheduler/', emailWebhook:'', smsWebhook:'', liveMode:false};
        parsed.notificationQueue ||= [];
        return parsed;
      }catch(err){
        console.error(err);
        const seeded = seedState();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
        return seeded;
      }
    }

    let state = loadState();
    const getEvent = id => state.events.find(e => e.id === id);
    const getPerson = id => state.people.find(p => p.id === id);
    const eventAssignments = eventId => state.assignments.filter(a => a.eventId === eventId);
    const formatDate = d => new Date(d+'T00:00:00').toLocaleDateString('fr-CA',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
    const formatMonthLabel = d => new Date(d+'T00:00:00').toLocaleDateString('fr-CA',{month:'long',year:'numeric'});
    const formatDateTime = iso => new Date(iso).toLocaleString('fr-CA',{dateStyle:'medium',timeStyle:'short'});

    function roleLabel(role, qty){ return `${role} · ${qty}`; }
    function buildConfirmLink(token){ const url = new URL(state.settings.appUrl || window.location.href); url.searchParams.set('token', token); return url.toString(); }

    function contactTag(pref){ return `<span class="tag ${pref}">${pref==='both'?'Email + SMS':pref==='sms'?'SMS':pref==='email'?'Email':'Aucune'}</span>`; }
    function typeTag(type){ return `<span class="tag ${type==='freelance'?'sms':'email'}">${type==='freelance'?'Pigiste':'Employé'}</span>`; }

    function computeChannels(person){
      const pref = person.contactPreference || 'none';
      const channels = [];
      if((pref === 'email' || pref === 'both') && person.email) channels.push('email');
      if((pref === 'sms' || pref === 'both') && person.phone) channels.push('sms');
      if(channels.length === 0){
        if(person.email) channels.push('email');
        else if(person.phone) channels.push('sms');
      }
      return channels;
    }

    function eventCoverage(event){
      const assigns = eventAssignments(event.id);
      let missing=0, pending=0;
      for(const [role, qty] of Object.entries(event.requiredRoles || {})){
        const roleAssignments = assigns.filter(a => a.role === role);
        const confirmed = roleAssignments.filter(a => a.status === 'confirmed').length;
        const waiting = roleAssignments.filter(a => a.status === 'sent' || a.status === 'waiting').length;
        missing += Math.max(0, qty - confirmed - waiting);
        pending += waiting;
      }
      if(missing === 0 && pending === 0) return {label:'Complet', cls:'complete'};
      if(missing === 0 && pending > 0) return {label:'En attente', cls:'pending'};
      return {label:'Incomplet', cls:'incomplete'};
    }

    function getAlerts(){
      const alerts = [];
      for(const ev of state.events){
        const assigns = eventAssignments(ev.id);
        assigns.filter(a => a.status === 'declined').forEach(a => {
          const person = getPerson(a.personId);
          alerts.push({type:'declined', eventId:ev.id, role:a.role, personId:a.personId, text:`${person?.name || 'Ressource'} a refusé ${ev.name}.`});
        });
        for(const [role, qty] of Object.entries(ev.requiredRoles || {})){
          const roleAssigns = assigns.filter(a => a.role === role);
          const active = roleAssigns.filter(a => ['confirmed','sent','waiting'].includes(a.status)).length;
          if(active < qty){ alerts.push({type:'missing', eventId:ev.id, role, text:`${ev.name} manque ${qty - active} ressource(s) pour le rôle ${role}.`}); }
        }
      }
      return alerts;
    }

      return {
        events:state.events.length,
        imported:state.events.filter(e => e.source === 'ics').length,
        people:state.people.length,
        pending:state.assignments.filter(a => a.status === 'sent' || a.status === 'waiting').length,
        alerts:getAlerts().length

    function renderCalendarSection(){

      const form = document.getElementById('assignForm');
      const eventSelect = form.elements.eventId; const roleSelect = form.elements.role; const personSelect = form.elements.personId;
      eventSelect.innerHTML = state.events.map(e => `<option value="${e.id}" ${e.id===state.selectedEventId?'selected':''}>${escapeHtml(e.name)} · ${escapeHtml(formatDate(e.date))}</option>`).join('');
      const event = getEvent(state.selectedEventId) || state.events[0];
      roleSelect.innerHTML = Object.keys(event?.requiredRoles || {'Général':1}).map(role => `<option value="${escapeHtml(role)}">${escapeHtml(role)}</option>`).join('');
      populateAssignPeople();
      eventSelect.onchange = () => { state.selectedEventId = eventSelect.value; const ev = getEvent(eventSelect.value); roleSelect.innerHTML = Object.keys(ev?.requiredRoles || {'Général':1}).map(role => `<option value="${escapeHtml(role)}">${escapeHtml(role)}</option>`).join(''); populateAssignPeople(); };
      roleSelect.onchange = populateAssignPeople;
      assignDialog.showModal();
      function populateAssignPeople(){
        const role = roleSelect.value;
        const evId = eventSelect.value;
        const already = new Set(eventAssignments(evId).map(a => a.personId));
        personSelect.innerHTML = state.people.filter(p => p.role === role && !already.has(p.id)).map(p => `<option value="${p.id}">${escapeHtml(p.name)} · ${escapeHtml(p.contactPreference || 'none')}</option>`).join('') || '<option value="">Aucune ressource disponible</option>';
      }
    }

    document.getElementById('assignForm').addEventListener('submit', ev => {
      ev.preventDefault();
      const fd = new FormData(ev.target); const eventId = String(fd.get('eventId')||''); const role = String(fd.get('role')||''); const personId = String(fd.get('personId')||'');
      if(!eventId || !role || !personId) return alert('Choisis un événement, un rôle et une ressource.');
      state.assignments.push({id:uid(), eventId, personId, role, status:'waiting', token:uid()+uid(), sentChannels:[], lastSentAt:''});
      state.selectedEventId = eventId; saveState(); assignDialog.close(); render();
    });

    function quickAssign(eventId, personId, role){
      state.assignments.push({id:uid(), eventId, personId, role, status:'waiting', token:uid()+uid(), sentChannels:[], lastSentAt:''});
      state.selectedEventId = eventId; saveState(); render();
    }

    async function sendAssignment(assignmentId){
      const assignment = state.assignments.find(a => a.id === assignmentId); if(!assignment) return;
      const person = getPerson(assignment.personId); const event = getEvent(assignment.eventId); if(!person || !event) return;
      const channels = computeChannels(person);
      if(channels.length === 0) return alert(`Aucun canal disponible pour ${person.name}.`);
      const payload = buildNotificationPayload(assignment, person, event, channels);
      const liveRequested = state.settings.liveMode && ((channels.includes('email') && state.settings.emailWebhook) || (channels.includes('sms') && state.settings.smsWebhook));
      let liveSent = false;
      if(liveRequested){
        try{
          await sendViaWebhooks(payload, channels);
          liveSent = true;
        }catch(err){
          console.error(err);
          alert('Le mode live a échoué. L’envoi a été conservé en simulation dans le journal.');
        }
      }
      assignment.status = 'sent';
      assignment.sentChannels = channels;
      assignment.lastSentAt = new Date().toISOString();
      state.notificationQueue.unshift({id:uid(), createdAt:new Date().toISOString(), status:liveSent ? 'sent' : 'simulated', channels, recipient:person.name, eventName:event.name, note:liveSent ? 'Webhook appelé avec succès' : 'Démo locale — envoi simulé'});
      saveState(); render();
    }

    async function sendViaWebhooks(payload, channels){
      const jobs = [];
      if(channels.includes('email') && state.settings.emailWebhook){
        jobs.push(fetch(state.settings.emailWebhook,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload, channel:'email'})}));
      }
      if(channels.includes('sms') && state.settings.smsWebhook){
        jobs.push(fetch(state.settings.smsWebhook,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload, channel:'sms'})}));
      }
      if(!jobs.length) return;
      const results = await Promise.all(jobs);
      results.forEach(r => { if(!r.ok) throw new Error('Webhook failed'); });
    }

    function buildNotificationPayload(assignment, person, event, channels){
      return {
        app:'Crew Scheduler v4', assignmentId:assignment.id, token:assignment.token, channels,
        recipient:{name:person.name,email:person.email,phone:person.phone,contactPreference:person.contactPreference},
        event:{id:event.id,name:event.name,date:event.date,time:event.time,location:event.location,role:assignment.role},
        confirmLink:buildConfirmLink(assignment.token),
        subject:`Confirmation demandée — ${event.name}`,
        emailBody:`Bonjour ${person.name},\n\nPeux-tu confirmer ta présence pour ${event.name} le ${formatDate(event.date)} à ${event.time} ?\nLieu : ${event.location || 'À confirmer'}\nRôle : ${assignment.role}\n\nConfirmer / refuser : ${buildConfirmLink(assignment.token)}\n`,
        smsBody:`${event.name} · ${event.date} ${event.time} · rôle ${assignment.role}. Confirme ici : ${buildConfirmLink(assignment.token)}`
      };
    }

    function previewAssignment(assignmentId){
      const assignment = state.assignments.find(a => a.id === assignmentId); if(!assignment) return;
      const person = getPerson(assignment.personId); const event = getEvent(assignment.eventId); if(!person || !event) return;
      const channels = computeChannels(person); const payload = buildNotificationPayload(assignment, person, event, channels);
      alert(`Prévisualisation pour ${person.name}\n\nCanaux: ${channels.join(' + ') || 'aucun'}\n\nEmail:\n${payload.emailBody}\n\nSMS:\n${payload.smsBody}`);
    }

    function sendAllSelected(){
      const selected = state.selectedEventId; if(!selected) return;
      const ids = state.assignments.filter(a => a.eventId === selected && a.status !== 'confirmed').map(a => a.id);
      if(!ids.length) return alert('Aucune assignation à envoyer.');
      ids.forEach(id => sendAssignment(id));
    }

    function parseRoles(text){
      const result = {}; String(text||'').split(',').map(s => s.trim()).filter(Boolean).forEach(part => {
        const [role, qty] = part.split(':').map(v => v.trim());
        const n = Number(qty || 1); if(role) result[role] = Number.isFinite(n) && n > 0 ? n : 1;
      });
      return Object.keys(result).length ? result : {'Son':1};
    }

    icsInput.addEventListener('change', async ev => {
      const file = ev.target.files?.[0]; if(!file) return;
      const text = await file.text();
      const imported = parseICS(text);
      if(!imported.length) return alert('Aucun événement trouvé dans ce fichier .ics');
      for(const item of imported){
        state.events.push({id:uid(), source:'ics', name:item.name, date:item.date, time:item.time, location:item.location, notes:item.notes, requiredRoles:{'Son':1}});
      }
      state.selectedEventId = state.events[state.events.length - imported.length].id;
      saveState(); render(); ev.target.value = '';
      alert(`${imported.length} événement(s) importé(s).`);
    });

    function parseICS(text){
      const lines = text.replace(/\r/g,'').split('\n');
      const events = []; let current = null;
      for(const line of lines){
        if(line.startsWith('BEGIN:VEVENT')) current = {};
        else if(line.startsWith('END:VEVENT') && current){
          if(current.date) events.push({name:current.summary || 'Événement importé', date:current.date, time:current.time || '08:00', location:current.location || '', notes:current.description || ''});
          current = null;
        }else if(current){
          if(line.startsWith('SUMMARY:')) current.summary = line.slice(8).trim();
          else if(line.startsWith('LOCATION:')) current.location = line.slice(9).trim();
          else if(line.startsWith('DESCRIPTION:')) current.description = line.slice(12).trim();
          else if(line.startsWith('DTSTART')){
            const value = line.split(':')[1]?.trim() || '';
            if(/^\d{8}T\d{6}Z?$/.test(value) || /^\d{8}T\d{4}/.test(value)){
              current.date = `${value.slice(0,4)}-${value.slice(4,6)}-${value.slice(6,8)}`;
              current.time = `${value.slice(9,11) || '08'}:${value.slice(11,13) || '00'}`;
            }else if(/^\d{8}$/.test(value)){
              current.date = `${value.slice(0,4)}-${value.slice(4,6)}-${value.slice(6,8)}`;
              current.time = '08:00';
            }
          }
        }
      }
      return events;
    }

    function renderConfirmPage(token){
      const assignment = state.assignments.find(a => a.token === token);
      if(!assignment){
        app.innerHTML = `<div class="confirmPage"><div class="confirmCard"><span class="tag none">Lien invalide</span><h1>Ce lien n'est plus valide.</h1><p>Le token de confirmation n'a pas été trouvé dans ce prototype local.</p></div></div>`;
        return;
      }
      const event = getEvent(assignment.eventId); const person = getPerson(assignment.personId);
      app.innerHTML = `
        <div class="confirmPage">
          <div class="confirmCard">
            <span class="tag outlook">Confirmation d'événement</span>
            <h1>${escapeHtml(person?.name || 'Ressource')}</h1>
            <p>Réponds à cette demande pour confirmer ta présence à l'événement.</p>
            <div class="confirmInfo">
              <div class="row"><strong>Événement</strong><div>${escapeHtml(event?.name || '')}</div></div>
              <div class="row"><strong>Date</strong><div>${escapeHtml(event ? formatDate(event.date) : '')} · ${escapeHtml(event?.time || '')}</div></div>
              <div class="row"><strong>Lieu</strong><div>${escapeHtml(event?.location || 'À confirmer')}</div></div>
              <div class="row"><strong>Rôle</strong><div>${escapeHtml(assignment.role)}</div></div>
            </div>
            <div class="confirmActions">
              <button class="btn primary" id="confirmYes">Je confirme</button>
              <button class="btn danger" id="confirmNo">Je refuse</button>
              <button class="btn secondary" id="backHome">Retour</button>
            </div>
          </div>
        </div>`;
      document.getElementById('confirmYes').addEventListener('click', () => { assignment.status = 'confirmed'; saveState(); alert('Merci — présence confirmée.'); goHome(); });
      document.getElementById('confirmNo').addEventListener('click', () => { assignment.status = 'declined'; saveState(); alert('Refus enregistré.'); goHome(); });
      document.getElementById('backHome').addEventListener('click', goHome);
    }

    function goHome(){ const url = new URL(window.location.href); url.searchParams.delete('token'); window.location.href = url.toString(); }

    initAuth().then(render);
  </script>
</body>
</html>
