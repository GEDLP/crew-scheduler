<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Calendars Debug</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f7fb}
button{margin:5px;padding:10px 14px;font-weight:bold}
.card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;margin:5px;cursor:pointer}
</style>
</head>
<body>

<h2>Calendriers disponibles</h2>

<button onclick="init()">Init</button>
<button onclick="login()">Login</button>
<button onclick="loadCalendars()">Lister les calendriers</button>

<div id="calendars"></div>
<h3>Événements</h3>
<div id="events"></div>

<script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
<script>

let pca;
let account;
let token;

function init(){
    pca = new msal.PublicClientApplication({
        auth:{
            clientId:"b71fb750-0c78-4903-9489-fd2d0fc18884",
            authority:"https://login.microsoftonline.com/b5e72da6-a727-4c1d-b80d-e381c3123448",
            redirectUri: window.location.origin + window.location.pathname
        }
    });
}

async function login(){
    const res = await pca.loginPopup({
        scopes:["User.Read","Calendars.Read","Calendars.Read.Shared"]
    });
    account = res.account;
}

async function getToken(){
    const res = await pca.acquireTokenSilent({
        account,
        scopes:["User.Read","Calendars.Read","Calendars.Read.Shared"]
    });
    token = res.accessToken;
}

async function loadCalendars(){
    await getToken();
    const res = await fetch("https://graph.microsoft.com/v1.0/me/calendars", {
        headers:{Authorization:"Bearer "+token}
    });
    const data = await res.json();

    const box = document.getElementById("calendars");
    box.innerHTML = "";

    data.value.forEach(cal => {
        const div = document.createElement("div");
        div.className="card";
        div.innerHTML = "<b>"+cal.name+"</b><br>"+cal.id;
        div.onclick = ()=>loadEvents(cal.id);
        box.appendChild(div);
    });
}

async function loadEvents(id){
    const start = new Date().toISOString();
    const end = new Date(Date.now()+1000*60*60*24*30).toISOString();

    const res = await fetch(
        `https://graph.microsoft.com/v1.0/me/calendars/${id}/calendarView?startDateTime=${start}&endDateTime=${end}`,
        {headers:{Authorization:"Bearer "+token}}
    );

    const data = await res.json();

    const box = document.getElementById("events");
    box.innerHTML = "";

    data.value.forEach(ev => {
        const div = document.createElement("div");
        div.className="card";
        div.innerHTML = ev.subject + "<br>" + ev.start.dateTime;
        box.appendChild(div);
    });
}

</script>
</body>
</html>
