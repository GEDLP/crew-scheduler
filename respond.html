<!DOCTYPE html>
<html>
<head>

  <title>Réponse disponibilité</title>
  <style>

    button {
      display: block;

      padding: 15px;
      width: 200px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .yes { background: #22c55e; color: white; }
    .maybe { background: #f59e0b; color: white; }
    .no { background: #ef4444; color: white; }
  </style>
</head>

<body>

<h2>Es-tu disponible ?</h2>

<button class="yes" onclick="respond('available')">✅ Disponible</button>

</html>
